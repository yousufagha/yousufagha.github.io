name: Refresh contribution graph

on:
  schedule:
    - cron: '17 15 * * *'   # daily, ~01:17 Melbourne time
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/gen_contrib_svg.py']

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Render contribution SVG from live GitHub data
        run: python scripts/gen_contrib_svg.py yousufagha public/github-contribution.svg

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain public/github-contribution.svg)" ]; then
            git add public/github-contribution.svg
            git commit -m "chore: refresh contribution graph"
            git push
          else
            echo "No change."
          fi
